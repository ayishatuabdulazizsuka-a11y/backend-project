<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pageone Hero Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="relative w-full h-screen bg-cover bg-center bg-no-repeat"
         style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c')">

        <!-- NAVBAR -->
        <nav class="absolute top-0 left-0 right-0 z-20 px-6 py-5 lg:px-16">
            <div class="flex items-center justify-between text-white">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    <span class="text-2xl font-bold">Pageone</span>
                </div>

                <!-- Menu -->
                <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                    <a href="#" class="hover:text-blue-400">Home</a>
                    <a href="#" class="hover:text-blue-400">About us</a>
                    <a href="#" class="hover:text-blue-400">Products</a>
                    <a href="#" class="hover:text-blue-400">Features</a>
                </div>

                <!-- Buttons -->
                <div class="flex items-center gap-3">
                    <button class="border border-white text-white px-4 py-2 rounded-full text-sm hover:bg-white hover:text-black">Login</button>
                    <button class="bg-indigo-600 text-white px-4 py-2 rounded-full text-sm hover:bg-indigo-700">Sign up</button>
                </div>
            </div>
        </nav>

        <!-- HERO CONTENT -->
        <div class="relative z-10 flex flex-col items-center justify-center text-center text-white h-full px-4">
            <h1 class="text-4xl md:text-5xl font-bold mb-3 leading-tight">
                Find quick solution with our <br> Smart Search
            </h1>
            <p class="text-gray-200 text-lg mb-8">
                Let's find the best solution you are seeking for
            </p>

            <!-- PILL SEARCH BAR -->
            <div class="bg-white rounded-full shadow-2xl p-2 flex items-center gap-2 w-full max-w-2xl">
                <input type="text" placeholder="Search solution..."
                       class="flex-1 p-3 pl-5 text-black outline-none rounded-full bg-transparent">
                <button class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-full font-semibold">
                    Search Now
                </button>
            </div>
        </div>
    </div>
</body>
    <!-- redeploy --> 
</html>
